<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive 3D Force-Directed Graph</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="toolbar-row">
        <span class="tb-title">Interactive 3D Force-Directed Graph</span>
        <span class="tb-sep"></span>

        <label class="tb-pill">
          <input type="checkbox" id="previewToggle" checked />
          Preview
        </label>
        <input
          class="tb-input tb-input--search"
          id="filterText"
          placeholder="Search title, objective, keyword…"
        />

        <span class="tb-sep"></span>

        <input
          class="tb-range tb-range--sample"
          id="sampleSlider"
          type="range"
          min="1"
          max="10"
          step="1"
          value="1"
        />
        <span id="sampleValue" class="tb-val">1%</span>
        <button id="applySample" class="tb-btn">Apply</button>
        <button id="preset1" class="tb-btn tb-btn--ghost" title="1% sample">
          1%
        </button>
        <button id="preset5" class="tb-btn tb-btn--ghost" title="5% sample">
          5%
        </button>
        <button id="preset10" class="tb-btn tb-btn--ghost" title="10% sample">
          10%
        </button>

        <span class="tb-sep"></span>

        <label class="tb-pill">
          <input type="checkbox" id="showProjects" checked />
          <span class="type-dot type-dot--project"></span>Proj
        </label>
        <label class="tb-pill">
          <input type="checkbox" id="showOrganizations" checked />
          <span class="type-dot type-dot--org"></span>Orgs
        </label>
        <label class="tb-pill">
          <input type="checkbox" id="showTopics" checked />
          <span class="type-dot type-dot--topic"></span>Topics
        </label>

        <span class="tb-spacer"></span>
        <div class="tb-status" id="status">Loading…</div>
      </div>

      <div class="toolbar-row toolbar-row--sub">
        <!-- Project + org filters -->
        <select id="statusFilter" class="tb-select">
          <option value="">Status: All</option>
          <option value="SIGNED">SIGNED</option>
          <option value="other">Other</option>
        </select>
        <input
          id="schemeFilter"
          class="tb-input tb-input--sm"
          placeholder="Scheme…"
          list="schemeList"
        />
        <datalist id="schemeList"></datalist>
        <input
          id="yearMin"
          type="number"
          class="tb-input tb-input--year"
          placeholder="From"
        />
        <span class="tb-dash">–</span>
        <input
          id="yearMax"
          type="number"
          class="tb-input tb-input--year"
          placeholder="To"
        />
        <input
          id="countryFilter"
          class="tb-input tb-input--sm"
          placeholder="Country…"
          list="countryList"
        />
        <datalist id="countryList"></datalist>

        <span class="tb-sep"></span>

        <!-- Link weights -->
        <span class="tb-label">Org</span>
        <input
          class="tb-range tb-range--sm"
          id="orgLinkWeight"
          type="range"
          min="0.5"
          max="3"
          step="0.1"
          value="1.3"
        />
        <span id="orgLinkWeightValue" class="tb-val">1.3</span>
        <span class="tb-label">Topic</span>
        <input
          class="tb-range tb-range--sm"
          id="topicLinkWeight"
          type="range"
          min="0.5"
          max="3"
          step="0.1"
          value="1"
        />
        <span id="topicLinkWeightValue" class="tb-val">1.0</span>

        <span class="tb-sep"></span>

        <!-- Particles -->
        <span class="tb-label">Ptcl</span>
        <input
          class="tb-range tb-range--sm"
          id="particleCountMult"
          type="range"
          min="0"
          max="10"
          step="0.1"
          value="1"
        />
        <span id="particleCountMultValue" class="tb-val">1.0x</span>
        <span class="tb-label">Spd</span>
        <input
          class="tb-range tb-range--sm"
          id="particleSpeedMult"
          type="range"
          min="0.1"
          max="5"
          step="0.1"
          value="2"
        />
        <span id="particleSpeedMultValue" class="tb-val">1.0x</span>

        <span class="tb-sep"></span>

        <button
          id="inspectMode"
          class="tb-btn is-active"
          title="View node details — no side effects"
        >
          Inspect
        </button>
        <button
          id="pinMode"
          class="tb-btn tb-btn--ghost"
          title="Click nodes to pin / unpin"
        >
          Pin
        </button>
        <button
          id="clusterMode"
          class="tb-btn tb-btn--ghost"
          title="Click an org or topic to collapse its projects"
        >
          Cluster
        </button>

        <span class="tb-sep"></span>

        <!-- Layout actions -->
        <button
          id="saveLayout"
          class="tb-btn"
          title="Save pins and cluster state to browser storage"
        >
          Save
        </button>
        <button
          id="clearPins"
          class="tb-btn tb-btn--ghost"
          title="Remove all pinned nodes"
        >
          Clear Pins
        </button>
        <button
          id="resetClusters"
          class="tb-btn tb-btn--ghost"
          title="Expand all collapsed clusters"
        >
          Expand All
        </button>
      </div>

      <div id="active-filters" class="active-filters"></div>
    </header>

    <div id="graph"></div>

    <div id="panel">
      <div class="panel-header">
        <div id="panel-meta">
          <div id="panel-badge" class="panel-type-badge"></div>
          <div id="panel-title" class="panel-title"></div>
        </div>
        <button id="panel-close">✕</button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>

    <div id="tooltip"></div>

    <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1/dist/3d-force-graph.min.js"></script>
    <script type="module" src="/client/main.js"></script>
  </body>
</html>
