<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive 3D Force-Directed Graph</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: radial-gradient(
          circle at top,
          #172033 0%,
          #0d1117 48%,
          #090c12 100%
        );
        color: #e6edf3;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
      }
      header {
        padding: 12px 20px 14px;
        background: rgba(22, 27, 34, 0.92);
        border-bottom: 1px solid #30363d;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
        gap: 10px;
        backdrop-filter: blur(10px);
      }
      .header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        width: 100%;
      }
      .header-title {
        min-width: 0;
      }
      header h1 {
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
      header .meta {
        font-size: 0.85rem;
        color: #9da7b3;
      }
      .header-controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        width: 100%;
      }
      .control-group {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        min-width: 0;
        padding-left: 10px;
        border-left: 1px solid #26313a;
      }
      .control-group:first-child {
        padding-left: 0;
        border-left: 0;
      }
      .control-group.stack {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }
      .control-heading {
        color: #9da7b3;
        font-size: 0.74rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        white-space: nowrap;
      }
      .control-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
      }
      .control-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: #9da7b3;
        font-size: 0.84rem;
          <div class="control-heading">Links</div>
          <div class="control-row">
            <label class="control-pill">
              Org
              <input
                id="orgLinkWeight"
                type="range"
                min="0.5"
                max="3"
                step="0.1"
                value="1.3"
                style="width: 84px"
              />
              <span
                id="orgLinkWeightValue"
                style="min-width: 28px; text-align: right"
                >1.3</span
              >
            </label>
            <label class="control-pill">
              Topic
              <input
                id="topicLinkWeight"
                type="range"
                min="0.5"
                max="3"
                step="0.1"
                value="1"
                style="width: 84px"
              />
              <span
                id="topicLinkWeightValue"
                style="min-width: 28px; text-align: right"
                >1.0</span
              >
            </label>
          </div>
        .control-group {
          padding-left: 0;
        <div class="control-group stack">
          <div class="control-heading">Particles</div>
          <div class="control-row">
            <label class="control-pill">
              Count
              <input
                id="particleCountMult"
                type="range"
                min="0"
                max="10"
                step="0.1"
                value="1"
                style="width: 84px"
              />
              <span
                id="particleCountMultValue"
                style="min-width: 36px; text-align: right"
                >1.0x</span
              >
            </label>
            <label class="control-pill">
              Speed
              <input
                id="particleSpeedMult"
                type="range"
                min="0.005"
                max="0.05"
                step="0.005"
                value="0.01"
                style="width: 84px"
              />
              <span
                id="particleSpeedMultValue"
                style="min-width: 36px; text-align: right"
                >0.010x</span
              >
            </label>
          </div>
            id="filterText"
            placeholder="Filter (title, org, topic)..."
          />
        </div>

        <div class="control-group">
          <div class="control-pill">Sample</div>
          <input
            id="sampleSlider"
            type="range"
            min="1"
            max="10"
            step="1"
            value="1"
            style="width: 120px"
          />
          <div
            id="sampleValue"
            style="
              width: 32px;
              text-align: right;
              color: #9da7b3;
              font-size: 0.9rem;
            "
          >
            1%
          </div>
          <button id="applySample" class="control-button">Apply</button>
          <button
            id="preset1"
            class="control-button secondary"
            title="1% sample"
          >
            1%
          </button>
          <button
            id="preset2"
            class="control-button secondary"
            title="2% sample"
          >
            2%
          </button>
          <button
            id="preset5"
            class="control-button secondary"
            title="5% sample"
          >
            5%
          </button>
        </div>

        <div class="control-group">
          <div class="control-pill">Links</div>
          <label class="control-pill">
            Org
            <input
              id="orgLinkWeight"
              type="range"
              min="0.5"
              max="3"
              step="0.1"
              value="1.3"
              style="width: 84px"
            />
            <span
              id="orgLinkWeightValue"
              style="min-width: 28px; text-align: right"
              >1.3</span
            >
          </label>
          <label class="control-pill">
            Topic
            <input
              id="topicLinkWeight"
              type="range"
              min="0.5"
              max="3"
              step="0.1"
              value="1"
              style="width: 84px"
            />
            <span
              id="topicLinkWeightValue"
              style="min-width: 28px; text-align: right"
              >1.0</span
            >
          </label>
        </div>

        <div class="control-group">
          <div class="control-pill">Particles</div>
          <label class="control-pill">
            Count
            <input
              id="particleCountMult"
              type="range"
              min="0"
              max="10"
              step="0.1"
              value="1"
              style="width: 84px"
            />
            <span
              id="particleCountMultValue"
              style="min-width: 36px; text-align: right"
              >1.0x</span
            >
          </label>
          <label class="control-pill">
            Speed
            <input
              id="particleSpeedMult"
              type="range"
              min="0.1"
              max="3"
              step="0.1"
              value="0.5"
              style="width: 84px"
            />
            <span
              id="particleSpeedMultValue"
              style="min-width: 36px; text-align: right"
              >0.5x</span
            >
          </label>
        </div>
      </div>
    </header>
    <div id="graph"></div>

    <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1/dist/3d-force-graph.min.js"></script>
    <script src="/client/main.js"></script>
  </body>
</html>
