<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive 3D Force-Directed Graph</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: radial-gradient(
          circle at top,
          #172033 0%,
          #0d1117 48%,
          #090c12 100%
        );
        color: #e6edf3;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
      }
      header {
        padding: 12px 24px;
        background: rgba(22, 27, 34, 0.92);
        border-bottom: 1px solid #30363d;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        backdrop-filter: blur(10px);
      }
      header h1 {
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      header .meta {
        font-size: 0.85rem;
        color: #9da7b3;
      }
      #graph {
        width: 100vw;
        height: calc(100vh - 49px);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Interactive 3D Force-Directed Graph</h1>
      <div style="display: flex; align-items: center; gap: 12px">
        <div class="meta" id="status">Loading graph data...</div>
        <div
          style="
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: 12px;
          "
        >
          <label
            style="
              display: flex;
              align-items: center;
              gap: 6px;
              color: #9da7b3;
              font-size: 0.9rem;
            "
          >
            <input type="checkbox" id="previewToggle" checked />
            Preview
          </label>
          <input
            id="filterText"
            placeholder="Filter (title, org, topic)..."
            style="
              padding: 6px 8px;
              border-radius: 6px;
              border: 1px solid #26313a;
              background: #081011;
              color: #e6edf3;
            "
          />
          <div
            style="
              display: flex;
              align-items: center;
              gap: 8px;
              padding-left: 8px;
              border-left: 1px solid #26313a;
            "
          >
            <div style="color: #9da7b3; font-size: 0.85rem">Sample:</div>
            <input
              id="sampleSlider"
              type="range"
              min="1"
              max="10"
              step="1"
              value="1"
              style="width: 120px"
            />
            <div
              id="sampleValue"
              style="
                width: 32px;
                text-align: right;
                color: #9da7b3;
                font-size: 0.9rem;
              "
            >
              1%
            </div>
            <button
              id="applySample"
              style="
                padding: 6px 8px;
                border-radius: 6px;
                border: 1px solid #26313a;
                background: #0b1520;
                color: #e6edf3;
              "
            >
              Apply
            </button>
            <button
              id="preset1"
              title="1% sample"
              style="
                padding: 6px;
                border-radius: 6px;
                background: #071018;
                color: #9da7b3;
                border: 1px solid #26313a;
              "
            >
              1%
            </button>
            <button
              id="preset5"
              title="5% sample"
              style="
                padding: 6px;
                border-radius: 6px;
                background: #071018;
                color: #9da7b3;
                border: 1px solid #26313a;
              "
            >
              5%
            </button>
            <button
              id="preset10"
              title="10% sample"
              style="
                padding: 6px;
                border-radius: 6px;
                background: #071018;
                color: #9da7b3;
                border: 1px solid #26313a;
              "
            >
              10%
            </button>
          </div>
          <div
            style="display: flex; align-items: center; gap: 8px; padding-left: 8px; border-left: 1px solid #26313a;"
          >
            <div style="color: #9da7b3; font-size: 0.85rem">Links:</div>
            <label
              style="display: flex; align-items: center; gap: 6px; color: #9da7b3; font-size: 0.85rem"
            >
              Org
              <input
                id="orgLinkWeight"
                type="range"
                min="0.5"
                max="3"
                step="0.1"
                value="1.3"
                style="width: 96px"
              />
              <span id="orgLinkWeightValue" style="min-width: 28px; text-align: right">1.3</span>
            </label>
            <label
              style="display: flex; align-items: center; gap: 6px; color: #9da7b3; font-size: 0.85rem"
            >
              Topic
              <input
                id="topicLinkWeight"
                type="range"
                min="0.5"
                max="3"
                step="0.1"
                value="1"
                style="width: 96px"
              />
              <span id="topicLinkWeightValue" style="min-width: 28px; text-align: right">1.0</span>
            </label>
          </div>
        </div>
      </div>
    </header>
    <div id="graph"></div>

    <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1/dist/3d-force-graph.min.js"></script>
    <script src="/client/main.js"></script>
  </body>
</html>
