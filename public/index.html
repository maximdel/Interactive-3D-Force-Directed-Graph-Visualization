<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive 3D Force-Directed Graph</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="header-top">
        <div class="header-title">
          <h1>Interactive 3D Force-Directed Graph</h1>
        </div>
        <div class="status" id="status">Loading graph data...</div>
      </div>

      <div class="header-controls">
        <section class="control-group">
          <label class="control-pill">
            <input type="checkbox" id="previewToggle" checked />
            Preview
          </label>
          <input
            class="control-input"
            id="filterText"
            placeholder="Filter (title, org, topic)..."
          />
        </section>

        <section class="control-group control-group--stack">
          <div class="control-heading">Sample</div>
          <div class="control-row">
            <input
              class="control-range control-range--sample"
              id="sampleSlider"
              type="range"
              min="1"
              max="10"
              step="1"
              value="1"
            />
            <div id="sampleValue" class="control-value">1%</div>
            <button id="applySample" class="control-button">Apply</button>
            <button
              id="preset1"
              class="control-button secondary"
              title="1% sample"
            >
              1%
            </button>
            <button
              id="preset5"
              class="control-button secondary"
              title="5% sample"
            >
              5%
            </button>
            <button
              id="preset10"
              class="control-button secondary"
              title="10% sample"
            >
              10%
            </button>
          </div>
        </section>

        <section class="control-group control-group--stack">
          <div class="control-heading">Links</div>
          <div class="control-row">
            <label class="control-pill">
              Org
              <input
                class="control-range"
                id="orgLinkWeight"
                type="range"
                min="0.5"
                max="3"
                step="0.1"
                value="1.3"
              />
              <span
                id="orgLinkWeightValue"
                class="control-value control-value--short"
                >1.3</span
              >
            </label>
            <label class="control-pill">
              Topic
              <input
                class="control-range"
                id="topicLinkWeight"
                type="range"
                min="0.5"
                max="3"
                step="0.1"
                value="1"
              />
              <span
                id="topicLinkWeightValue"
                class="control-value control-value--short"
                >1.0</span
              >
            </label>
          </div>
        </section>

        <section class="control-group control-group--stack">
          <div class="control-heading">Particles</div>
          <div class="control-row">
            <label class="control-pill">
              Count
              <input
                class="control-range"
                id="particleCountMult"
                type="range"
                min="0"
                max="10"
                step="0.1"
                value="1"
              />
              <span id="particleCountMultValue" class="control-value"
                >1.0x</span
              >
            </label>
            <label class="control-pill">
              Speed
              <input
                class="control-range"
                id="particleSpeedMult"
                type="range"
                min="0.1"
                max="5"
                step="0.1"
                value="2"
              />
              <span id="particleSpeedMultValue" class="control-value"
                >1.0x</span
              >
            </label>
          </div>
        </section>

        <section class="control-group control-group--stack">
          <div class="control-heading">Layout</div>
          <div class="control-row">
            <button id="pinMode" class="control-button is-active">
              Pin Mode
            </button>
            <button id="clusterMode" class="control-button secondary">
              Cluster Mode
            </button>
            <button id="saveLayout" class="control-button">Save Layout</button>
            <button id="clearPins" class="control-button secondary">
              Clear Pins
            </button>
            <button id="resetClusters" class="control-button secondary">
              Expand All
            </button>
            <div
              class="control-value"
              style="margin-left: 8px; color: #9da7b3; font-size: 0.8rem"
            >
              Pin Mode: click a node to pin/unpin. Cluster Mode: click org/topic
              nodes to collapse.
            </div>
          </div>
        </section>
      </div>
    </header>

    <div id="graph"></div>
    <div id="panel">
      <div class="panel-header">
        <div id="panel-meta">
          <div id="panel-badge" class="panel-type-badge"></div>
          <div id="panel-title" class="panel-title"></div>
        </div>
        <button id="panel-close">✕</button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>
    <div id="tooltip"></div>
    <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1/dist/3d-force-graph.min.js"></script>
    <script src="/client/main.js"></script>
  </body>
</html>
